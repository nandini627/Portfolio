<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ===================== VIEWPORT & COMPATIBILITY ===================== -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ========================= SEO: TITLE ============================== -->
    <!-- Keep under 60 characters for full display in search results -->
    <title>Nandini Prajapati | Full-Stack Developer Portfolio</title>

    <!-- ======================== SEO: META TAGS =========================== -->
    <!-- Description: Keep between 150-160 characters for optimal display -->
    <meta
      name="description"
      content="Nandini Prajapati — Aspiring Full-Stack Developer specializing in React, Node.js, and modern web technologies. Explore projects, certifications, and get in touch."
    />

    <!-- Keywords: Relevant terms recruiters and search engines look for -->
    <meta
      name="keywords"
      content="Nandini Prajapati, Aspiring Full-Stack Developer, React Developer, Node.js, JavaScript, Web Developer Portfolio, Frontend Developer, Software Engineer"
    />

    <!-- Author -->
    <meta name="author" content="Nandini Prajapati" />

    <!-- Robots: Allow search engines to index and follow all links -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL: Prevents duplicate-content issues -->
    <link rel="canonical" href="https://nandini-prajapati-portfolio.vercel.app/" />

    <!-- ==================== OPEN GRAPH (Social Sharing) ================== -->
    <!-- These tags control how your site appears when shared on Facebook,
         LinkedIn, Discord, and other platforms that support Open Graph. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nandini Prajapati | Full-Stack Developer Portfolio" />
    <meta
      property="og:description"
      content="Explore the portfolio of Nandini Prajapati — projects, skills, certifications, and contact information."
    />
    <meta property="og:url" content="https://nandini-prajapati-portfolio.vercel.app/" />
    <meta property="og:site_name" content="Nandini Prajapati Portfolio" />
    <meta property="og:image" content="https://nandini-prajapati-portfolio.vercel.app/og-image.png" />
    <meta property="og:image:alt" content="Nandini Prajapati — Developer Portfolio Preview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===================== TWITTER CARD (X) ============================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nandini Prajapati | Full-Stack Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Full-Stack Developer specializing in React, Node.js, and modern web technologies."
    />
    <meta name="twitter:image" content="https://nandini-prajapati-portfolio.vercel.app/og-image.png" />
